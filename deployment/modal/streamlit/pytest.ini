[pytest]
# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, multi-module)
    services: Tests for services module
    config: Tests for config module
    utils: Tests for utils module

# Coverage options (used with pytest-cov)
# Run: pytest --cov=services --cov=config --cov=utils --cov-report=html
